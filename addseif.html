   <main>
    <section>
	  <h2><ins>Add New Course </ins></h2>
	  <form class="course-formm" action = "#">
	  
       <div>
           <label> Course Name 
           <input type="text" placeholder ="Enter Course Name" required>	   
           </label>
	   </div>
   
       <div>
           <label> Instructor 
           <input type="text" placeholder ="Enter Instructor Name" required>	   
           </label>
	   </div>


       <div>
           <label> Credits Hours 
           <input type="number" placeholder ="Enter Credits Hours" required>	   
           </label>
	   </div>
	   
	    <div>
           <label> price 
           <input type="number" placeholder ="Enter price Course " required>	   
           </label>
	   </div>

       <div>
           <label> Duration (Weeks)
           <input type="number" placeholder ="Enter course Duration" required>	   
           </label>
	   </div>
       
	   <div>
           <label> Notes 
           <input type="text" placeholder ="Enter course Notes" required>	   
           </label>
	   </div>
	   
	   <button type ="save"> Save </button>
        
	 </form>
	</section>
